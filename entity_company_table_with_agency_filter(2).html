<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Entity Company Table</title>

<style>
 @font-face {
  font-family: "Benton";
  src: url("Benton Sans/Benton Sans Book.otf");
}

@font-face {
  font-family: "BentonStrong";
  src: url("Benton Sans/Benton Sans Bold.otf");
}

body {
  font-family: "Benton", Helvetica, Arial, sans-serif;
  margin: 32px;
  color: #000;
  background: #fff;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  border-top: 3px solid #000;
}

th,
td {
  border-top: 1px solid #ccc;
  padding: 16px;
  vertical-align: top;
  text-align: left;
}

th {
  font-family: "BentonStrong", Helvetica, Arial, sans-serif;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border-top: none;
}

.entity-cell {
  width: 15%;
}

.company-cell {
  width: 20%;
}

.links-cell {
  width: 18%;
}

.section-label {
  display: inline-block;
  font-family: "BentonStrong", Helvetica, Arial, sans-serif;
  font-size: 10px;
  line-height: 1;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border: 1px solid #000;
  padding: 4px 5px 3px;
  margin-bottom: 8px;
}

.entity-name {
  font-family: "BentonStrong", Helvetica, Arial, sans-serif;
  font-size: 18px;
  margin-bottom: 6px;
}

.description {
  font-family: "Benton", Helvetica, Arial, sans-serif;
  font-size: 15px;
  line-height: 1.4;
  color: #000;
}

.company {
  display: block;
  margin-bottom: 16px;
}

.company:last-child {
  margin-bottom: 0;
}

.company-topline {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: baseline;
}

.company-name {
  font-family: "BentonStrong", Helvetica, Arial, sans-serif;
  font-size:12px;
}

.overall-value {
  font-family: "Benton", Helvetica, Arial, sans-serif;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
    font-size:12px;

}

.company-detail {
  margin-top: 4px;
}

.single-year-value {
  font-size: 12px;
  color: #000;
  font-variant-numeric: tabular-nums;
}

.sparkline {
  width: 120px;
  height: 42px;
  overflow: visible;
}

.no-sparkline {
  display: none;
}

.link-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  font-size:11px;
}

a {
  color: #007194;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

@media (max-width: 800px) {
  table,
  thead,
  tbody,
  tr,
  th,
  td {
    display: block;
  }

  thead {
    display: none;
  }

  tr {
    border-top: 3px solid #000;
    padding: 12px 0;
  }

  td {
    border-top: none;
    padding: 10px 0;
  }

  td::before {
    content: attr(data-label);
    display: block;
    font-family: "BentonStrong", Helvetica, Arial, sans-serif;
    font-size: 13px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .company {
    grid-template-columns: 1fr auto;
  }

  .sparkline,
  .no-sparkline {
    grid-column: 1 / -1;
    width: 150px;
  }
}
/* .source-links a {
  color: #007194;
}

.source-links a:hover {
  color: #00415B;
}

.action-links a {
  color: #9E0B0F;
}

.action-links a:hover {
  color: #ED1C24;
} */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
}

.tab-btn {
  font-family: "BentonStrong", Helvetica, Arial, sans-serif;
  border: 1px solid #000;;
  background: #fff;
  padding: 10px 14px;
  cursor: pointer;
}

.tab-btn.active {
  background: #000;;
  color: #fff;
}

.tab-btn.disabled,
.tab-btn:disabled {
  color: #999;
  border-color: #ccc;
  background: #f3f3f3;
  cursor: not-allowed;
  opacity: 0.65;
}

.tab-btn.disabled:hover,
.tab-btn:disabled:hover {
  text-decoration: none;
}
.company-name-wrap {
  min-width: 0;
}

.agency-list {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 3px;
}

.agency-tag {
  font-family: "BentonStrong", Helvetica, Arial, sans-serif;
  font-size: 10px;
  line-height: 1;
  letter-spacing: 0.03em;
  color: #555;
  border: 1px solid #aaa;
  padding: 3px 4px 2px;
  text-transform: uppercase;
}

.filter-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: -8px 0 24px;
  flex-wrap: wrap;
}

.filter-label {
  font-family: "BentonStrong", Helvetica, Arial, sans-serif;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.agency-select {
  font-family: "Benton", Helvetica, Arial, sans-serif;
  font-size: 13px;
  border: 1px solid #000;
  background: #fff;
  padding: 8px 10px;
  min-width: 180px;
}

.filter-count {
  font-size: 12px;
  color: #555;
}

@media (max-width: 800px) {
  .filter-bar {
    align-items: flex-start;
    flex-direction: column;
  }

  .agency-select {
    width: 100%;
  }
}

</style>
</head>

<body>

<h1>DHS interior surveilance resource TEST DO NOT SHARE THIS DRAFT</h1>
<div class="tabs" id="tabs"></div>

<div class="filter-bar" id="filter-bar">
  <label class="filter-label" for="agency-filter">Agency filter</label>
  <select class="agency-select" id="agency-filter" onchange="setAgencyFilter(this.value)">
    <option value="">All agencies</option>
  </select>
  <div class="filter-count" id="filter-count"></div>
</div>

<table>
  <thead>
    <tr>
      <th class="entity-cell">Type</th>
      <th class="company-cell">Expenditures and Contractors (since 1/20/21)</th>
      <th class="source-links-cell">Further Information on Capabilities, Uses, and Abuses </th>
      <th class="action-links-cell">DHS Policies and Other DHS Resources</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<script>


function makeSparkline(yearly) {
  const entries = Object.entries(yearly)
    .map(([year, value]) => ({
      year: +year,
      value: +value
    }))
    .sort((a, b) => a.year - b.year);

  const width = 120;
  const height = 42;

  const leftPad = 12;
  const rightPad = 12;
  const topPad = 3;
  const bottomPad = 16;

  const plotWidth = width - leftPad - rightPad;
  const plotHeight = height - topPad - bottomPad;

  const minYear = entries[0].year;
  const maxYear = entries[entries.length - 1].year;

  const minValue = Math.min(...entries.map(d => d.value));
  const maxValue = Math.max(...entries.map(d => d.value));

  const yearRange = maxYear - minYear || 1;
  const valueRange = maxValue - minValue || 1;

  const xScale = year =>
    leftPad + ((year - minYear) / yearRange) * plotWidth;

  const yScale = value =>
    topPad + plotHeight - ((value - minValue) / valueRange) * plotHeight;

  const points = entries
    .map(d => `${xScale(d.year)},${yScale(d.value)}`)
    .join(" ");

  const hoverDots = entries.map(d => `
    <g>
      <circle
        class="spark-hit"
        cx="${xScale(d.year)}"
        cy="${yScale(d.value)}"
        r="2"
      >
        <title>${d.year}: ${d.value}</title>
      </circle>

      <circle
        class="spark-dot"
        cx="${xScale(d.year)}"
        cy="${yScale(d.value)}"
        r="2.8"
      ></circle>
    </g>
  `).join("");

  const axisY = height - bottomPad + 5;

  return `
    <svg class="sparkline" viewBox="0 0 ${width} ${height}" aria-label="Yearly values">
      <polyline
        points="${points}"
        fill="none"
        stroke="black"
        stroke-width="2"
      />

      ${hoverDots}

      <line
        x1="${leftPad}"
        y1="${axisY}"
        x2="${width - rightPad}"
        y2="${axisY}"
        stroke="#aaa"
        stroke-width="1"
      />

      <text
        x="${leftPad}"
        y="${height - 1}"
        font-size="9"
        text-anchor="start"
      >${minYear}</text>

      <text
        x="${width - rightPad}"
        y="${height - 1}"
        font-size="9"
        text-anchor="end"
      >${maxYear}</text>
    </svg>
  `;
}
function formatMoney(value) {
  if (value === null || value === undefined || value === "") return "";

  const number = Number(value);

  if (Number.isNaN(number)) return value;

  return "$" + number.toLocaleString();
}

function renderAgencies(company) {
  const agencies = getCompanyAgencies(company);

  if (!agencies.length) return "";

  return `
    <div class="agency-list">
      ${agencies.map(agency => `
        <span class="agency-tag">${agency}</span>
      `).join("")}
    </div>
  `;
}

function renderCompanies(companies) {
  return companies.map(company => {
    const yearlyEntries = company.yearly
      ? Object.entries(company.yearly)
          .map(([year, value]) => ({
            year: +year,
            value: +value
          }))
          .sort((a, b) => a.year - b.year)
      : [];

    let detail = "";

    if (yearlyEntries.length > 1) {
      detail = makeSparkline(company.yearly);
    } else if (yearlyEntries.length === 1) {
      detail = `
        <div class="single-year-value">
          ${yearlyEntries[0].year}: ${formatMoney(yearlyEntries[0].value)}
        </div>
      `;
    }

    return `
      <div class="company">
        <div class="company-topline">
          <div class="company-name-wrap">
            <div class="company-name">${company.name}</div>
            ${renderAgencies(company)}
          </div>

          <div class="overall-value">${formatMoney(company.overall)}</div>
        </div>

        <div class="company-detail">
          ${detail}
        </div>
      </div>
    `;
  }).join("");
}
function renderLinks(links, className) {
  return `
    <div class="link-list ${className}">
      ${links.map(link => `
        <a
          href="${link.url}"
          target="_blank"
          rel="noopener noreferrer"
        >
          ${link.label}
        </a>
      `).join("")}
    </div>
  `;
}


function getCompanyAgencies(company) {
  if (!company) return [];

  const agencies = company.agencies !== undefined ? company.agencies : company.agency;

  if (Array.isArray(agencies)) {
    return agencies.map(String).map(d => d.trim()).filter(Boolean);
  }

  if (typeof agencies === "string") {
    return agencies.split(",").map(d => d.trim()).filter(Boolean);
  }

  return [];
}

function getAgenciesFromData(data) {
  const agencies = new Set();

  data.forEach(row => {
    (row.companies || []).forEach(company => {
      getCompanyAgencies(company).forEach(agency => agencies.add(agency));
    });
  });

  return Array.from(agencies).sort((a, b) => a.localeCompare(b));
}

function companyMatchesAgency(company, agency) {
  if (!agency) return true;

  return getCompanyAgencies(company).some(item => item === agency);
}

function rowMatchesAgency(row, agency) {
  if (!agency) return true;

  return (row.companies || []).some(company => companyMatchesAgency(company, agency));
}

function filterCompaniesForAgency(row, agency) {
  if (!agency) return row;

  return {
    ...row,
    companies: (row.companies || []).filter(company => companyMatchesAgency(company, agency))
  };
}

function updateAgencyFilterOptions(data) {
  const select = document.getElementById("agency-filter");
  const agencies = getAgenciesFromData(data);

  select.innerHTML = `
    <option value="">All agencies</option>
    ${agencies.map(agency => `
      <option value="${agency}" ${agency === activeAgency ? "selected" : ""}>
        ${agency}
      </option>
    `).join("")}
  `;
}

function renderCurrentData() {
  const filteredData = currentData
    .filter(row => rowMatchesAgency(row, activeAgency))
    .map(row => filterCompaniesForAgency(row, activeAgency));

  renderTable(filteredData);

  const countEl = document.getElementById("filter-count");
  if (activeAgency) {
    countEl.textContent = `${filteredData.length} of ${currentData.length} rows shown`;
  } else {
    countEl.textContent = `${currentData.length} rows shown`;
  }
}

function renderTable(data) {
  const tbody = document.getElementById("table-body");

  tbody.innerHTML = data.map(row => `
    <tr>
      <td data-label="Entity">
        ${row.sectionLabel ? `<div class="section-label">${row.sectionLabel}</div>` : ""}
        <div class="entity-name">${row.entity}</div>
        <div class="description">${row.description}</div>
      </td>

      <td data-label="Companies">
        ${renderCompanies(row.companies)}
      </td>

      <td data-label="Source Links">
        ${renderLinks(row.sourceLinks, "source-links")}
      </td>

      <td data-label="Action Links">
${renderLinks(row.actionLinks, "action-links")}
      </td>
    </tr>
  `).join("");
}
filesNames = [
"Type of Video Surveillance",
"Type of Biometric Collection or Technology",
"Type of Data Analysis Tool",
"Type of Data Purchase",
"Type of Location Tracking",
"Type of Phone Access Tools"]


const tabs = [
  {
    label: "Video Surveillance",
    file: "Type of Video Surveillance.json"
  },
  {
    label: "Biometric Collection, Storage, and Identification",
    file: "Type of Biometric Collection or Technology.json"
  },
  {
    label: "Real-time/Detailed Location Tracking",
    file: "Type of Location Tracking.json"
  },
  {
    label: "Tools to Access Phone Content",
    file: "Type of Phone Access Tools.json"
  },
  {
    label: "Data Purchases",
    file: "Type of Data Purchase.json"
  },
  {
    label: "Data Analysis Tools",
    file: "Type of Data Analysis Tool.json"
  }
];

let activeTabIndex = 0;
let showingAllTabs = false;
let currentData = [];
let activeAgency = "";
let tabDataCache = [];
let allData = [];

function getRowsForTab(index) {
  return tabDataCache[index] || [];
}

function getVisibleDataForCurrentView() {
  if (showingAllTabs) return allData;
  return getRowsForTab(activeTabIndex);
}

function tabHasActiveAgency(index) {
  if (!activeAgency) return true;
  return getRowsForTab(index).some(row => rowMatchesAgency(row, activeAgency));
}

function getFirstEnabledTabIndex() {
  return tabs.findIndex((tab, i) => tabHasActiveAgency(i));
}

function renderTabs() {
  const tabsEl = document.getElementById("tabs");

  const allButton = `
    <button
      class="tab-btn ${showingAllTabs ? "active" : ""}"
      type="button"
      onclick="loadAllTabs()"
    >
      All
    </button>
  `;

  const tabButtons = tabs.map((tab, i) => {
    const disabled = !tabHasActiveAgency(i);

    return `
      <button
        class="tab-btn ${disabled ? "disabled" : ""} ${!showingAllTabs && i === activeTabIndex ? "active" : ""}"
        type="button"
        ${disabled ? "disabled aria-disabled='true'" : `onclick="loadTab(${i})"`}
        title="${disabled ? `No ${activeAgency} entries in this tab` : ""}"
      >
        ${tab.label}
      </button>
    `;
  }).join("");

  tabsEl.innerHTML = allButton + tabButtons;
}

function addSectionLabels(data, label) {
  return data.map(row => ({
    ...row,
    sectionLabel: label
  }));
}

function loadTab(index) {
  if (!tabHasActiveAgency(index)) return;

  activeTabIndex = index;
  showingAllTabs = false;
  currentData = getRowsForTab(index);
  renderTabs();
  renderCurrentData();
}

function loadAllTabs() {
  showingAllTabs = true;
  currentData = allData;
  renderTabs();
  renderCurrentData();
}

function setAgencyFilter(agency) {
  activeAgency = agency;

  if (!showingAllTabs && !tabHasActiveAgency(activeTabIndex)) {
    const firstEnabledTabIndex = getFirstEnabledTabIndex();

    if (firstEnabledTabIndex >= 0) {
      activeTabIndex = firstEnabledTabIndex;
      currentData = getRowsForTab(activeTabIndex);
    } else {
      showingAllTabs = true;
      currentData = allData;
    }
  } else {
    currentData = getVisibleDataForCurrentView();
  }

  updateAgencyFilterOptions(allData);
  renderTabs();
  renderCurrentData();
}

function loadInitialData() {
  const fetches = tabs.map(tab =>
    fetch(tab.file)
      .then(response => {
        if (!response.ok) {
          throw new Error(`Could not load ${tab.file}`);
        }

        return response.json();
      })
      .then(data => addSectionLabels(data, tab.label))
  );

  Promise.all(fetches)
    .then(tabData => {
      tabDataCache = tabData;
      allData = tabData.flat();
      currentData = getRowsForTab(activeTabIndex);

      updateAgencyFilterOptions(allData);
      renderTabs();
      renderCurrentData();
    })
    .catch(error => {
      console.error(error);
      document.getElementById("table-body").innerHTML = `
        <tr>
          <td colspan="4">
            Could not load table data
          </td>
        </tr>
      `;
    });
}

loadInitialData();
</script>

</body>
</html>
