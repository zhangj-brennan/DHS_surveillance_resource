<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Entity Company Table</title>

<style>
@font-face {
  font-family: "Benton";
  src: url("Benton Sans/Benton Sans Book.otf");
}

@font-face {
  font-family: "BentonStrong";
  src: url("Benton Sans/Benton Sans Bold.otf");
}

:root {
  --mobile-breakpoint: 650px;
}

body {
  font-family: "Benton", Helvetica, Arial, sans-serif;
  margin: 32px;
  color: #000;
  background: #fff;
}

h1 {
  font-family: "BentonStrong", Helvetica, Arial, sans-serif;
  font-size: 24px;
}

/* sticky header */

.sticky-header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: #fff;
  padding: 12px 0 14px;
  border-bottom: 3px solid #000;
}

.sticky-header h1 {
  margin-top: 0;
  margin-bottom: 14px;
}

/* controls */

.controls-area,
.search-control,
.filter-control,
.mobile-filter-control {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.controls-area {
  gap: 8px;
  margin: 0;
}

.desktop-tabs-wrap {
  display: block;
}

.mobile-filter-control {
  display: none;
}

.filter-label {
  font-family: "BentonStrong", Helvetica, Arial, sans-serif;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.table-select,
.table-search {
  width: 320px;
  max-width: 100%;
  box-sizing: border-box;
  font-family: "Benton", Helvetica, Arial, sans-serif;
  font-size: 13px;
  line-height: 1.3;
  color: #000;
  background: #fff;
  border: 1px solid #000;
  border-radius: 0;
  padding: 6px 8px;
}

.table-select {
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
}

.mobile-tab-select {
  display: none;
}

.filter-count {
  font-size: 12px;
  color: #dbdada;
}

/* search navigation */

.search-input-row {
  display: flex;
  align-items: stretch;
  width: 320px;
  max-width: 100%;
}

.search-input-row .table-search {
  width: auto;
  flex: 1 1 auto;
  min-width: 0;
}

.search-nav {
  display: flex;
  align-items: stretch;
  border: 1px solid #000;
  border-left: 0;
  background: #fff;
}

.search-count {
  display: flex;
  align-items: center;
  min-width: 52px;
  padding: 0 7px;
  font-size: 11px;
  white-space: nowrap;
}

.search-nav-btn {
  width: 30px;
  padding: 0;
  border: 0;
  border-left: 1px solid #000;
  background: #fff;
  color: #000;
  font-family: "BentonStrong", Helvetica, Arial, sans-serif;
  font-size: 14px;
  cursor: pointer;
}

.search-nav-btn:hover:not(:disabled) {
  background: #000;
  color: #fff;
}

.search-nav-btn:disabled {
  color: #aaa;
  cursor: default;
}

.search-highlight {
  background: #ffcf01;
  color: #000;
}

.search-highlight.is-current-search-match {
  background: #007194;
  color: #fff;
  outline: 2px solid #007194;
  outline-offset: 1px;
}

/* tabs */

.tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 6px;
}

.tab-btn {
  font-family: "BentonStrong", Helvetica, Arial, sans-serif;
  border: 1px solid #000;
  background: #fff;
  padding: 4px;
  cursor: pointer;
  font-size: 12px;
}

.tab-btn.active {
  background: #000;
  color: #fff;
}

.tab-btn.disabled,
.tab-btn:disabled {
  color: #b0b0b0;
  border-color: #b0b0b0;
  background: #fff;
  cursor: not-allowed;
  opacity: 0.65;
}

/* table */

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

th,
td {
  border-top: 1px solid #ccc;
  padding: 16px;
  vertical-align: top;
  text-align: left;
}

th {
  font-family: "BentonStrong", Helvetica, Arial, sans-serif;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border-top: none;
}

.entity-cell {
  width: 15%;
}

.company-cell {
  width: 30%;
  min-width: 500px;
}

.links-cell {
  width: 18%;
}

/* row content */

.section-label {
  display: inline-block;
  font-family: "BentonStrong", Helvetica, Arial, sans-serif;
  font-size: 10px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: #007194;
}

.entity-name {
  font-family: "BentonStrong", Helvetica, Arial, sans-serif;
  font-size: 18px;
  margin-bottom: 6px;
}

.description {
  font-size: 15px;
  line-height: 1.4;
}

/* companies */

.company-section-total,
.spark-total,
.single-year-value {
  font-size: 12px;
  line-height: 1.2;
}

.company-section-total {
  margin-bottom: 12px;
  font-family:"BentonStrong"
}

.spark-total {
  margin-top: 2px;
}

.company-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px 24px;
}

.company {
  display: block;
  margin-bottom: 6px;
}

.company:last-child {
  margin-bottom: 0;
}

.company-topline {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: baseline;
}

.company-name,
.agency-tag {
  font-family: "BentonStrong", Helvetica, Arial, sans-serif;
}

.company-name {
  font-size: 12px;
}

.company-name-wrap {
  min-width: 0;
}

.company-detail {
  margin-top: 4px;
}

.agency-list {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 3px;
}

.agency-tag {
  font-size: 10px;
  line-height: 1;
  letter-spacing: 0.03em;
  color: #fff;
  background: #000;
  padding: 4px 4px 2px;
  text-transform: uppercase;
}

/* sparklines */

.sparkline {
  width: 120px;
  height: 54px;
  overflow: visible;
}

.no-sparkline {
  display: none;
}

.spark-tooltip {
  position: fixed;
  z-index: 9999;
  display: none;
  pointer-events: none;
  background: #000;
  color: #fff;
  font-family: "Benton", Helvetica, Arial, sans-serif;
  font-size: 11px;
  line-height: 1.25;
  padding: 6px 7px 5px;
  border-radius: 0;
  white-space: nowrap;
}

/* links */

.link-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  font-size: 11px;
}

a {
  color: #007194;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

.footnote-marker {
  font-family: "BentonStrong", Helvetica, Arial, sans-serif;
  font-size: 0.7em;
  line-height: 0;
  vertical-align: super;
  margin-left: 1px;
}
thead th {
  position: sticky;
  top: var(--sticky-offset);
  z-index: 900;
  background: #fff;

  box-shadow: inset 0 -1px 0 #000;
}

.usecase-group {
  margin-top: 10px;
  margin-left: 16px;
}
/* 
.usecase-header {
  font-family: "BentonStrong", Helvetica, Arial, sans-serif;
  font-size: 10px;
  line-height: 1.2;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
} */

.usecase-link {
  display: block;
  margin: 2px 0;
}
.usecase-group {
  margin-top: 10px;
  margin-left: 0;
  padding-left: 0;
}

.usecase-header {
  margin: 0 0 4px 0;
  padding: 0;
}

.usecase-list {
  margin: 0;
  padding-left: 18px; /* only the bullets are indented */
}

.usecase-list li {
  margin: 2px 0;
}

.reference-bullet-list,
.usecase-list {
  margin: 2px 0;
  padding-left: 18px;
}

.reference-bullet-list li,
.usecase-list li {
  margin: 0;
  padding: 0;
  line-height: 1.25;
}

/* mobile */

@media (max-width: 650px) {
  body {
    margin: 15px;
  }

  .sticky-header h1 {
    font-size: 24px;
    line-height: 1.15;
    margin: 0;
      border-bottom: none;

  }

  .desktop-tabs-wrap {
    display: none;
  }

  .mobile-filter-control {
    display: flex;
  }

  .mobile-tab-select {
    display: block;
  }

  .table-select,
  .table-search {
    width: 100%;
    font-size: 14px;
    padding: 6px 8px 3px;
    min-height: 24px;
  }

  .search-input-row {
    width: 100%;
  }

  .search-count {
    min-width: 48px;
    font-size: 10px;
  }

  .search-nav-btn {
    width: 28px;
  }

.section-label {
  color: #6CBAD6;
}

  .filter-label {
    font-size: 11px;
    margin-bottom: 0;
    padding: 0;
  }

  table {
    margin: 0px;
  }

  table,
  thead,
  tbody,
  tr,
  th,
  td {
    display: block;
  }

  thead {
    display: none;
  }

  tr {
    padding: 12px 0;
  }

  td {
    border-top: 1px solid #d9d9d9;
    padding: 14px 0;
  }

  td:first-child {
    border-top: none;
  }

  td::before {
    content: attr(data-label);
    display: block;
    font-family: "BentonStrong", Helvetica, Arial, sans-serif;
    font-size: 13px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  td[data-label="Entity"] {
    position: static;
    background: transparent;
    border-bottom: none;
  }

  td[data-label="Entity"]::before {
    display: none;
  }

  td[data-label="Entity"] .description {
    margin-top: 10px;
  }

  .company-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px 16px;
  }

  .sparkline,
  .no-sparkline {
    grid-column: 1 / -1;
    width: 150px;
  }
}
.company-total {
  margin-top: 2px;
  margin-bottom: 4px;
  font-family: "BentonStrong", Helvetica, Arial, sans-serif;
  font-size: 12px;
  line-height: 1.2;
  color: #007194;
  font-variant-numeric: tabular-nums;
}
@media (max-width: 650px) {
  tr {
    position: relative;
  }

  td[data-label="Entity"] {
    display: contents;
  }

  td[data-label="Entity"]::before {
    display: none;
  }

  .mobile-row-sticky-title {
    position: sticky;
    top: 180px;
    z-index: 25;
    background: #000;
    color:white;
    padding: 6px 10px;
    margin:0px;

  }

  td[data-label="Entity"] .description {
    display: block;
    margin-top: 10px;
    padding: 14px 0;
    border-top: none;
  }
}
</style>
</head>
<body><div class="spark-tooltip" id="spark-tooltip"></div>
<div class="sticky-header">

<h1>DHS’s Domestic Surveillance Tools</h1>

<div class="controls-area">
  <div class="desktop-tabs-wrap">
    <label class="filter-label">Types:</label>
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="mobile-filter-control">
    <label class="filter-label" for="mobile-tab-select">Types:</label>
    <select class="table-select mobile-tab-select" id="mobile-tab-select" onchange="handleMobileTabChange(this.value)">
      <option value="all">All</option>
    </select>
  </div>

  <div class="filter-control">
    <label class="filter-label" for="agency-filter">Subcomponent Filter</label>
    <select class="table-select agency-select" id="agency-filter" onchange="setAgencyFilter(this.value)">
      <option value="">All agencies</option>
    </select>
    <div class="filter-count" id="filter-count"></div>
  </div>

  <div class="search-control">
    <label class="filter-label" for="search-box">Search</label>

    <div class="search-input-row">
      <input
        id="search-box"
        class="table-search"
        type="search"
        placeholder="Search types, companies, agencies..."
        oninput="setSearchFilter(this.value)"
        onkeydown="handleSearchKeydown(event)"
      />

      <div class="search-nav" aria-label="Search result navigation">
        <span class="search-count" id="search-count" aria-live="polite">0 / 0</span>
        <button
          class="search-nav-btn"
          id="search-prev"
          type="button"
          aria-label="Previous search result"
          onclick="goToPreviousSearchMatch()"
          disabled
        >↑</button>
        <button
          class="search-nav-btn"
          id="search-next"
          type="button"
          aria-label="Next search result"
          onclick="goToNextSearchMatch()"
          disabled
        >↓</button>
      </div>
    </div>
  </div>

</div>
</div>
<table>
  <thead>
    <tr>
      <th class="entity-cell">Type</th>
      <th class="company-cell">Expenditures and Contractors (since 1/20/21)</th>
      <th class="source-links-cell">Further Information on Capabilities, Uses, and Abuses</th>
      <th class="action-links-cell">DHS Policies and Other DHS Resources</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<script>


let searchFilter = "";
let searchMatches = [];
let activeSearchMatchIndex = -1;

function setSearchFilter(value) {
  searchFilter = value.trim().toLowerCase();
  activeSearchMatchIndex = -1;
  renderCurrentData();
  refreshSearchMatches(true);
}

function refreshSearchMatches(jumpToFirst = false) {
  searchMatches = Array.from(
    document.querySelectorAll("mark.search-highlight")
  );

  if (!searchFilter || searchMatches.length === 0) {
    activeSearchMatchIndex = -1;
    updateSearchNavigator();
    return;
  }

  if (jumpToFirst || activeSearchMatchIndex < 0) {
    activeSearchMatchIndex = 0;
  } else if (activeSearchMatchIndex >= searchMatches.length) {
    activeSearchMatchIndex = searchMatches.length - 1;
  }

  activateSearchMatch(activeSearchMatchIndex, jumpToFirst);
}

function activateSearchMatch(index, shouldScroll = true) {
  searchMatches.forEach(match => {
    match.classList.remove("is-current-search-match");
  });

  if (!searchMatches.length) {
    activeSearchMatchIndex = -1;
    updateSearchNavigator();
    return;
  }

  activeSearchMatchIndex =
    ((index % searchMatches.length) + searchMatches.length) %
    searchMatches.length;

  const activeMatch = searchMatches[activeSearchMatchIndex];
  activeMatch.classList.add("is-current-search-match");

  if (shouldScroll) {
    scrollToSearchMatch(activeMatch);
  }

  updateSearchNavigator();
}

function scrollToSearchMatch(match) {
  if (!match) return;

  const stickyHeaderHeight =
    document.querySelector(".sticky-header")?.offsetHeight || 0;

  const desktopTableHeaderHeight =
    window.matchMedia("(min-width: 651px)").matches
      ? document.querySelector("thead")?.offsetHeight || 0
      : 0;

  const offset = stickyHeaderHeight + desktopTableHeaderHeight + 20;
  const targetY =
    match.getBoundingClientRect().top + window.pageYOffset - offset;

  window.scrollTo({
    top: Math.max(0, targetY),
    behavior: "smooth"
  });
}

function updateSearchNavigator() {
  const count = document.getElementById("search-count");
  const previous = document.getElementById("search-prev");
  const next = document.getElementById("search-next");
  const hasMatches = searchMatches.length > 0;

  if (count) {
    count.textContent = hasMatches
      ? `${activeSearchMatchIndex + 1} / ${searchMatches.length}`
      : "0 / 0";
  }

  if (previous) previous.disabled = !hasMatches;
  if (next) next.disabled = !hasMatches;
}

function goToNextSearchMatch() {
  if (!searchMatches.length) return;
  activateSearchMatch(activeSearchMatchIndex + 1);
}

function goToPreviousSearchMatch() {
  if (!searchMatches.length) return;
  activateSearchMatch(activeSearchMatchIndex - 1);
}

function handleSearchKeydown(event) {
  if (event.key !== "Enter") return;

  event.preventDefault();

  if (event.shiftKey) {
    goToPreviousSearchMatch();
  } else {
    goToNextSearchMatch();
  }
}
function renderDescription(description, links = []) {
  const text = String(description || "");

  if (!text) return "";

  const validLinks = (links || []).filter(link =>
    link &&
    link.word &&
    link.url
  );

  if (!validLinks.length) {
    return highlightSearch(text);
  }

  const matches = [];

  validLinks.forEach(link => {
    const searchWord = String(link.word);
    const index = text.toLowerCase().indexOf(searchWord.toLowerCase());

    if (index === -1) return;

    const end = index + searchWord.length;

    const overlaps = matches.some(match =>
      index < match.end && end > match.start
    );

    if (!overlaps) {
      matches.push({
        start: index,
        end,
        url: link.url
      });
    }
  });

  if (!matches.length) {
    return highlightSearch(text);
  }

  matches.sort((a, b) => a.start - b.start);

  let html = "";
  let position = 0;

  matches.forEach(match => {
    html += highlightSearch(text.slice(position, match.start));

   html += `<a class="description-link" href="${match.url}" target="_blank" rel="noopener noreferrer">${highlightSearch(text.slice(match.start, match.end))}</a>`;

    position = match.end;
  });

  html += highlightSearch(text.slice(position));

  return html;
}

function highlightSearch(text) {
  if (!searchFilter || !text) return text || "";

  const escapedSearch = searchFilter.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const regex = new RegExp(`(${escapedSearch})`, "gi");

  return String(text).replace(regex, `<mark class="search-highlight">$1</mark>`);
}

function scrollTableToTop() {
  const table = document.querySelector("table");
  if (!table) return;

  const stickyHeight =
  document.querySelector(".sticky-header")?.offsetHeight || 0;

const y =
  table.getBoundingClientRect().top +
  window.pageYOffset -
  stickyHeight -
  20;

  window.scrollTo({
    top: y,
    behavior: "smooth"
  });
}

function makeSparkline(yearly) {
  
  const entries = Object.entries(yearly)
    .map(([year, value]) => ({
      year: +year,
      value: +value
    }))
    .sort((a, b) => a.year - b.year);

  const width = 120;
  const height = 42;

  const leftPad = 0;
  const rightPad = 20;
  const topPad = 3;
  const bottomPad = 16;

  const plotWidth = width - leftPad - rightPad;
  const plotHeight = height - topPad - bottomPad;

  const minYear = entries[0].year;
  const maxYear = entries[entries.length - 1].year;

  const minValue = Math.min(...entries.map(d => d.value));
  const maxValue = Math.max(...entries.map(d => d.value));
  const axisLabel = formatCompactMoney(maxValue);

  const yearRange = maxYear - minYear || 1;
  const valueRange = maxValue - minValue || 1;

  const xScale = year =>
    leftPad + ((year - minYear) / yearRange) * plotWidth;

  const yScale = value =>
    topPad + plotHeight - ((value - minValue) / valueRange) * plotHeight;

  const maxEntry = entries.reduce((best, d) =>
    d.value > best.value ? d : best
  , entries[0]);

  const maxPointX = xScale(maxEntry.year);
  const maxPointY = yScale(maxEntry.value);

  const labelX = 2;
  const connectorStartX = 0;
  const connectorEndX = Math.max(connectorStartX, maxPointX - 5);

  const points = entries
    .map(d => `${xScale(d.year)},${yScale(d.value)}`)
    .join(" ");

  const hoverDots = entries.map(d => `
    <g>
      <circle
        cx="${xScale(d.year)}"
        cy="${yScale(d.value)}"
        r="8"
        fill="transparent"
        onmousemove="showSparkTooltip(event, '${d.year}', '${formatMoney(d.value)}')"
        onmouseleave="hideSparkTooltip()"
      ></circle>

      <circle
        class="spark-dot"
        cx="${xScale(d.year)}"
        cy="${yScale(d.value)}"
        r="2.8"
        fill="#007194"
        pointer-events="none"
      ></circle>
    </g>
  `).join("");

  const axisY = height - bottomPad + 5;

  return `
    <svg class="sparkline" viewBox="0 0 ${width} ${height}" aria-label="Yearly values">
      <text
        x="${width-rightPad+4}"
        y="${maxPointY + 2}"
        font-size="8"
        font-family="BentonStrong"
        text-anchor="start"
        fill="#000"
      >${axisLabel}</text>

   <line
      x1="${connectorEndX+2}"
      y1="${maxPointY}"
      x2="${width-rightPad}"
      y2="${maxPointY}"
      stroke="#000"
      stroke-width=".5"
      stroke-dasharray="2,2"
    />

      <polyline
        points="${points}"
        fill="none"
        stroke="#007194"
        stroke-width="2"
      />

      ${hoverDots}

      <line
        x1="${leftPad}"
        y1="${topPad}"
        x2="${leftPad}"
        y2="${axisY}"
        stroke="#000"
        stroke-width="1"
      />

      <line
        x1="${leftPad}"
        y1="${axisY}"
        x2="${width - rightPad}"
        y2="${axisY}"
        stroke="#000"
        stroke-width="1"
      />

      <text
        x="${leftPad}"
        y="${height - 1}"
        font-size="9"
        text-anchor="start"
      >${minYear}</text>

      <text
        x="${width - rightPad}"
        y="${height - 1}"
        font-size="9"
        text-anchor="end"
      >${maxYear}</text>
    </svg>
  `;
}

function formatCompactMoney(value) {
  if (value >= 1000000000) {
    return "$" + (value / 1e9).toFixed(1) + "B";
  }

  if (value >= 1000000) {
    return "$" + (value / 1e6).toFixed(0) + "M";
  }

  if (value >= 1000) {
    return "$" + (value / 1000).toFixed(0) + "K";
  }

  return "$" + value;
}

function showSparkTooltip(event, year, value) {
  const tooltip = document.getElementById("spark-tooltip");

  tooltip.innerHTML = `
    <strong>${year}</strong><br>
    ${value}
  `;

  tooltip.style.display = "block";
  tooltip.style.left = `${event.clientX + 12}px`;
  tooltip.style.top = `${event.clientY + 12}px`;
}

function hideSparkTooltip() {
  const tooltip = document.getElementById("spark-tooltip");
  tooltip.style.display = "none";
}

function formatMoney(value) {
  if (value === null || value === undefined || value === "") return "";

  const number = Number(value);

  if (Number.isNaN(number)) return value;

  return "$" + number.toLocaleString();
}
function renderAgencies(company) {
  const agencies = getCompanyAgencies(company);

  if (!agencies.length) return "";

  return `
    <div class="agency-list">

}
function renderCompanies(companies, allCompanies = companies) {
  const displayedCompanies = Array.isArray(companies) ? companies : [];
  const totalSource = Array.isArray(allCompanies) ? allCompanies : [];

  if (totalSource.length === 0) {
    return `
      <div class="no-vendor-info">
        No public vendor information
      </div>
    `;
  }

  const sectionTotal = totalSource.reduce((sum, company) => {
    const companyTotal = Object.values(company.yearly || {}).reduce(
      (companySum, value) =>
        companySum + Number(value || 0),
      0
    );

    return sum + companyTotal;
  }, 0);

  const allYears = totalSource.flatMap(company =>
    Object.keys(company.yearly || {})
      .map(Number)
      .filter(Number.isFinite)
  );

  const uniqueYears = [...new Set(allYears)].sort((a, b) => a - b);

let summary;

if (uniqueYears.length === 0) {
  summary = `DHS total: At least ${formatMoney(sectionTotal)}`;
} else if (uniqueYears.length === 1) {
  summary = `${uniqueYears[0]} DHS total: At least ${formatMoney(sectionTotal)}`;
} else {
  summary = `${uniqueYears[0]}–${uniqueYears[uniqueYears.length - 1]} DHS total: At least ${formatMoney(sectionTotal)}`;
}
  return `
    <div class="company-section-total">
      ${summary}
    </div>

    <div class="company-grid">
      ${displayedCompanies.map(company => {
        const yearlyEntries = company.yearly
          ? Object.entries(company.yearly)
              .map(([year, value]) => ({
                year: Number(year),
                value: Number(value)
              }))
              .filter(entry =>
                Number.isFinite(entry.year) &&
                Number.isFinite(entry.value)
              )
              .sort((a, b) => a.year - b.year)
          : [];

        const companyTotal = yearlyEntries.reduce(
          (sum, entry) => sum + entry.value,
          0
        );

        let detail = "";

        if (yearlyEntries.length > 1) {
          detail = makeSparkline(company.yearly);
        } else if (yearlyEntries.length === 1) {
          detail = `
            <div class="single-year-value">
              ${yearlyEntries[0].year}: ${formatMoney(yearlyEntries[0].value)}
            </div>
          `;
        }

        return `
          <div class="company">
            <div class="company-topline">
              <div class="company-name-wrap">
                <div class="company-name">
                  ${highlightSearch(company.name)}
                </div>

                <div class="company-total">
                  ${formatMoney(companyTotal)}
                </div>

                ${renderAgencies(company)}
              </div>
            </div>

            <div class="company-detail">
              ${detail}
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}
function renderLinks(links, className) {
  let html = `<div class="link-list ${className}">`;
  let bulletBuffer = [];

  function formatLinkLabel(link) {
    const label = highlightSearch(link.label);

    return link.italic
      ? `<em>${label}</em>`
      : label;
  }

  function renderLinkContent(link) {
    const label = formatLinkLabel(link);

    if (link.url && link.url.trim() !== "") {
      return `<a href="${link.url}" target="_blank" rel="noopener noreferrer">${label}</a>`;
    }

    return `<span class="link-text">${label}</span>`;
  }

  function renderRegularLink(link) {
    return `
      <div class="link-text-row">
        ${renderLinkContent(link)}
      </div>
    `;
  }

  function flushBulletBuffer() {
    if (!bulletBuffer.length) return;

    html += `
      <ul class="reference-bullet-list">
        ${bulletBuffer.map(link => `
          <li>
            ${renderLinkContent(link)}
          </li>
        `).join("")}
      </ul>
    `;

    bulletBuffer = [];
  }

  (links || []).forEach(link => {
    if (link.bullet) {
      bulletBuffer.push(link);
    } else {
      flushBulletBuffer();
      html += renderRegularLink(link);
    }
  });

  flushBulletBuffer();

  html += `</div>`;

  return html;
}

function getCompanyAgencies(company) {
  if (!company) return [];

  const agencies = company.agencies !== undefined ? company.agencies : company.agency;

  if (Array.isArray(agencies)) {
    return agencies.map(String).map(d => d.trim()).filter(Boolean);
  }

  if (typeof agencies === "string") {
    return agencies.split(",").map(d => d.trim()).filter(Boolean);
  }

  return [];
}

function getAgenciesFromData(data) {
  const agencies = new Set();

  data.forEach(row => {
    (row.companies || []).forEach(company => {
      getCompanyAgencies(company).forEach(agency => agencies.add(agency));
    });
  });

  return Array.from(agencies).sort((a, b) => a.localeCompare(b));
}

function companyMatchesAgency(company, agency) {
  if (!agency) return true;

  return getCompanyAgencies(company).some(item => item === agency);
}

function rowMatchesAgency(row, agency) {
  if (!agency) return true;

  return (row.companies || []).some(company => companyMatchesAgency(company, agency));
}

function filterCompaniesForAgency(row, agency) {
  if (!agency) return row;

  return {
    ...row,
    allCompanies: row.companies || [],
    companies: (row.companies || []).filter(company =>

  };
}

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const nextChar = text[i + 1];

    if (char === '"' && inQuotes && nextChar === '"') {
      cell += '"';
      i++;
    } else if (char === '"') {
      inQuotes = !inQuotes;
    } else if (char === "," && !inQuotes) {
      row.push(cell);
      cell = "";
    } else if ((char === "\n" || char === "\r") && !inQuotes) {
      if (char === "\r" && nextChar === "\n") i++;
      row.push(cell);
      if (row.some(value => value.trim() !== "")) rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += char;
    }
  }

  row.push(cell);
  if (row.some(value => value.trim() !== "")) rows.push(row);

  if (!rows.length) return [];

  const headers = rows[0].map(header => header.trim());

  return rows.slice(1).map(values => {
    const obj = {};
    headers.forEach((header, i) => {
      obj[header] = values[i] !== undefined ? values[i].trim() : "";
    });
    return obj;
  });
}

function fetchCSV(file) {
  return fetch(file).then(response => {
    if (!response.ok) {
      throw new Error(`Could not load ${file}`);
    }
    return response.text();
  }).then(parseCSV);
}

function normalizeText(value) {
  return String(value || "").trim();
}

function normalizeHeaderName(value) {
  return String(value || "")
    .replace(/^\uFEFF/, "")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "")
    .trim();
}

function getCSVValue(row, possibleHeaders) {
  const normalizedLookup = {};

  Object.keys(row || {}).forEach(key => {
    normalizedLookup[normalizeHeaderName(key)] = row[key];
  });

  for (const header of possibleHeaders) {
    const value = normalizedLookup[normalizeHeaderName(header)];
    if (value !== undefined) return value;
  }

  return "";
}

function makeRowKey(category, surveillanceType) {
  return `${normalizeText(category)}|||${normalizeText(surveillanceType)}`;
}

function parseMoneyToNumber(value) {
  const cleaned = String(value || "")
    .replace(/[$,]/g, "")
    .trim();

  if (!cleaned) return null;

  const number = Number(cleaned);
  return Number.isNaN(number) ? null : number;
}

function splitCompanyNameAndAgencies(name) {
  const cleanName = normalizeText(name);
  const match = cleanName.match(/^(.*?)\s*\(([^()]*)\)\s*$/);

  if (!match) {
    return {
      name: cleanName,
      agencies: []
    };
  }

  return {
    name: match[1].trim(),
    agencies: match[2].split(",").map(d => d.trim()).filter(Boolean)
  };
}

function getReferenceColumn(linkType) {
  const type = normalizeText(linkType).toLowerCase();

  if (
    type.includes("policy") ||
    type.includes("policies") ||
    type.includes("dhs") ||
    type.includes("resource") ||
    type.includes("action")
  ) {
    return "actionLinks";
  }

  return "sourceLinks";
}

function makeLinkLabel(url) {
  try {
    const parsed = new URL(url);
    return parsed.hostname.replace(/^www\./, "");
  } catch (error) {
    return url;
  }
}

function buildRowsFromCSVs(descriptions, companies, references, footnotes) {
  const rowsByKey = new Map();

  function ensureRow(category, surveillanceType) {
    const cleanCategory = normalizeText(category);
    const cleanSurveillanceType = normalizeText(surveillanceType);
    const key = makeRowKey(cleanCategory, cleanSurveillanceType);

    if (!rowsByKey.has(key)) {
      const tab = tabs.find(item => item.category === cleanCategory);

      rowsByKey.set(key, {
        category: cleanCategory,
        sectionLabel: tab ? tab.label : cleanCategory,
        entity: cleanSurveillanceType,
        description: "",
        descriptionLinks: [],
        footnotes: [],
        companies: [],
        sourceLinks: [],
        actionLinks: []
      });
    }

    return rowsByKey.get(key);
  }
descriptions.forEach(item => {
  const category = getCSVValue(item, ["Category"]);
  const surveillanceType = getCSVValue(item, [
    "Surveillance Type",
    "Survaillence Type",
    "SurveillanceType"
  ]);

  if (!normalizeText(category) || !normalizeText(surveillanceType)) return;

  const row = ensureRow(category, surveillanceType);

  row.description = normalizeText(
    getCSVValue(item, ["Description"])
  );

  row.descriptionLinks = [1, 2, 3]
    .map(number => ({
      word: normalizeText(
        getCSVValue(item, [
          `Link ${number} word`,
          `Link ${number} Word`
        ])
      ),
      url: normalizeText(
        getCSVValue(item, [
          `Link ${number} link`,
          `Link ${number} Link`

      )

    .filter(link => link.word && link.url);
});

  companies.forEach(item => {
    const category = getCSVValue(item, ["Category"]);

    const contractorName = getCSVValue(item, ["Contractor Name", "Contractor", "Company", "Company Name"]);
    const componentFunding = getCSVValue(item, ["DHS Component - Funding", "component-funding", "Component Funding", "Component", "Agency", "Agencies"]);
    if (!normalizeText(category) || !normalizeText(surveillanceType)) return;

    if (!normalizeText(contractorName) || normalizeText(contractorName).toLowerCase() === "undefined") return;

    const row = ensureRow(category, surveillanceType);
    const agencies = normalizeText(componentFunding)
      .split(",")
      .map(d => d.trim())
      .filter(Boolean);

    yearlyColumns.forEach(({ column, year }) => {

references.forEach(item => {

row[column].push({

(footnotes || []).forEach(item => {

  const number = normalizeText(

  const precedingPhrase = normalizeText(

  if (!surveillanceType || !number || !precedingPhrase) return;

  const matchingRow = Array.from(rowsByKey.values()).find(row =>

  if (!matchingRow) {

  matchingRow.footnotes.push({

      .map(linkNumber => ({

        ),

        )
      }))
      .filter(link => link.word && link.url)
  });
});

  return Array.from(rowsByKey.values());
}

function footnoteCategoryMatchesRow(footnoteCategory, row) {
  const normalizedFootnoteCategory = normalizeText(footnoteCategory).toLowerCase();
  const normalizedRowCategory = normalizeText(row.category).toLowerCase();
  const normalizedSectionLabel = normalizeText(row.sectionLabel).toLowerCase();

  if (!normalizedFootnoteCategory) return true;

  const aliases = {
    "video surveillance": ["type of video surveillance", "video surveillance"],
    "biometrics": [
      "type of biometric collection or technology",
      "biometric collection, storage, and identification",
      "biometrics"
    ],
    "location tracking": [
      "type of location tracking",
      "real-time/detailed location tracking",
      "location tracking"
    ],
    "phone access tool": [
      "type of phone access tools",
      "tools to access phone content",
      "phone access tool"
    ],
    "data purchases": ["type of data purchase", "data purchases"],
    "data analysis tools": ["type of data analysis tool", "data analysis tools"]
  };

  const acceptedCategories = aliases[normalizedFootnoteCategory] || [normalizedFootnoteCategory];

  return acceptedCategories.includes(normalizedRowCategory) ||
    acceptedCategories.includes(normalizedSectionLabel);
}

function applyFootnotesToElement(element, footnotes = []) {
  if (!element || !footnotes.length) return;

  footnotes.forEach(footnote => {
    const phrase = String(footnote.precedingPhrase || "");
    if (!phrase) return;

    const walker = document.createTreeWalker(
      element,
      NodeFilter.SHOW_TEXT,
      {
        acceptNode(node) {
          const parent = node.parentElement;
          if (!parent) return NodeFilter.FILTER_REJECT;
          if (parent.closest("sup.footnote-marker")) return NodeFilter.FILTER_REJECT;
          if (parent.closest("script, style")) return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        }
      }
    );

    let textNode;
    while ((textNode = walker.nextNode())) {
      const text = textNode.nodeValue || "";
      const index = text.toLowerCase().indexOf(phrase.toLowerCase());
      if (index === -1) continue;

      const before = text.slice(0, index + phrase.length);
      const after = text.slice(index + phrase.length);
      const fragment = document.createDocumentFragment();

      fragment.appendChild(document.createTextNode(before));

      const marker = document.createElement("sup");
      marker.className = "footnote-marker";
      marker.textContent = footnote.number;
      marker.setAttribute("aria-label", `Footnote ${footnote.number}`);
      fragment.appendChild(marker);

      fragment.appendChild(document.createTextNode(after));
      textNode.parentNode.replaceChild(fragment, textNode);
      return;
    }

    console.warn(
      "Footnote phrase not found:",
      footnote.number,
      footnote.precedingPhrase
    );
  });
}

function loadTab(index) {
  if (!tabHasActiveAgency(index)) return;

  activeTabIndex = index;
  showingAllTabs = false;
  currentData = getRowsForTab(index);
  renderTabs();
  renderCurrentData();
  scrollTableToTop();
}

function loadAllTabs() {
  showingAllTabs = true;
  currentData = allData;
  renderTabs();
  renderCurrentData();
  scrollTableToTop();
}

function setAgencyFilter(agency) {
  activeAgency = agency;

  if (!showingAllTabs && !tabHasActiveAgency(activeTabIndex)) {
    const firstEnabledTabIndex = getFirstEnabledTabIndex();

    if (firstEnabledTabIndex >= 0) {
      activeTabIndex = firstEnabledTabIndex;
      currentData = getRowsForTab(activeTabIndex);
    } else {
      showingAllTabs = true;
      currentData = allData;
    }
  } else {
    currentData = getVisibleDataForCurrentView();
  }

  updateAgencyFilterOptions(allData);
  renderTabs();
  renderCurrentData();
  scrollTableToTop();
}

function loadInitialData() {
  Promise.all([
    fetchCSV(DATA_FILES.descriptions),
    fetchCSV(DATA_FILES.companies),
    fetchCSV(DATA_FILES.references),
    fetchCSV(DATA_FILES.footnotes)
  ])
    .then(([descriptions, companies, references, footnotes]) => {
      const rows = buildRowsFromCSVs(descriptions, companies, references, footnotes);

      tabDataCache = tabs.map(tab =>
        rows.filter(row => row.category === tab.category)
      );

      allData = tabDataCache.flat();
      showingAllTabs = true;
      currentData = allData;

      updateAgencyFilterOptions(allData);
      renderTabs();
      renderCurrentData();
      updateStickyOffsets();
    })
    .catch(error => {
      console.error(error);
      document.getElementById("table-body").innerHTML = `
        <tr>
          <td colspan="4">
            Could not load table data
          </td>
        </tr>
      `;
    });
}

function updateStickyOffsets() {
  const sticky = document.querySelector(".sticky-header");
  const thead = document.querySelector("thead");

  if (!sticky || !thead) return;

  document.documentElement.style.setProperty(
    "--sticky-offset",
    `${sticky.offsetHeight}px`
  );
}

window.addEventListener("resize", updateStickyOffsets);
window.addEventListener("load", updateStickyOffsets);

loadInitialData();
